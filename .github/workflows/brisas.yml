name: Smart Brisas

on:
  schedule:
    - cron: "*/15 5-22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  brisas:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: brisas
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Run brisas
        env:
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONFIG_URL: https://raw.githubusercontent.com/jafonsosantos/irrigation-dashboard/main/config.json
        run: python brisas.py
