name: Smart Irrigation

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Origem do disparo (manual / scheduler)"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  irrigate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: irrigation
      cancel-in-progress: false
    steps:
      - name: Checkout repo (for log persistence)
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run irrigation
        env:
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          IRRIGATION_LOG: irrigation-log.json
          CONFIG_URL: https://raw.githubusercontent.com/jafonsosantos/irrigation-dashboard/main/config.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REASON: ${{ github.event.inputs.reason }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python irrigation.py
      - name: Commit updated log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add irrigation-log.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "log: $(date -u +%F)"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main && git push && break
              sleep 5
            done
          fi
