name: Smart Irrigation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  irrigate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: irrigation
      cancel-in-progress: false
    steps:
      - name: Checkout repo (for log persistence)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run irrigation
        env:
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          IRRIGATION_LOG: irrigation-log.json
        run: python irrigation.py

      - name: Commit updated log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add irrigation-log.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "log: $(date -u +%F)"
          git push || true
