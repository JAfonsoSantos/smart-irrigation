name: Smart Irrigation

on:
  schedule:
    # 06:30 UTC = 07:30 Europe/Lisbon (Winter) / 07:30 in Summer too (Portugal stays UTC+0/+1)
    # Actually: 07:00 Lisbon = 06:00 UTC (winter) / 06:00 UTC (summer DST = 07:00 local)
    # Using 06:00 UTC so it runs around 07:00–08:00 local time
    - cron: "0 6 * * *"
  workflow_dispatch:   # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  irrigate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: irrigation
      cancel-in-progress: false
    steps:
      - name: Checkout repo (for log persistence)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run irrigation
        env:
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          IRRIGATION_LOG: irrigation-log.json
        run: python irrigation.py

      - name: Commit updated log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add irrigation-log.json || true
          git diff --cached --quiet || git commit -m "log: $(date -u +%F)"
          git push || true
